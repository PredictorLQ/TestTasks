services:
  postgres:
    image: postgres:16-alpine
    container_name: order-tracking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: order_tracking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - order-tracking
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d order_tracking"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: order-tracking-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - order-tracking

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: order-tracking-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - order-tracking
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  jaeger:
    image: jaegertracing/all-in-one:1.62
    container_name: order-tracking-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "4317:4317"
      - "4318:4318"
      - "16686:16686"
    networks:
      - order-tracking

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: order-tracking-api:latest
    container_name: order-tracking-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=order_tracking;Username=postgres;Password=postgres
      Kafka__BootstrapServers: kafka:29092
      Kafka__OrderStatusTopic: order-status-changed
      UseHttpsRedirection: "false"
      OpenTelemetry__Enabled: "true"
      OpenTelemetry__OtlpEndpoint: http://jaeger:4317
      OpenTelemetry__ExportToConsole: "false"
    ports:
      - "5080:8080"
    volumes:
      - api_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - order-tracking
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

networks:
  order-tracking:
    driver: bridge

volumes:
  postgres_data:
  api_logs:
